animations {
    enabled = 1

    # --- Bezier Curves ---
    # Fast, fluid transitions (macOS / Material You inspired)
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    
    # Smooth, slight bounce for windows
    bezier = elegant_bounce, 0.55, 1.07, 0.28, 1.12
    bezier = backward, 0.49, 0.09, 0.38, 1.24

    # Linear curve for smooth looping
    bezier = linear, 1, 1, 1, 1

    # --- Animations ---
    # Windows
    animation = windowsIn, 1, 5, elegant_bounce, slide down
    # animation = windowsIn, 1, 5, backward, slide down
    animation = windowsOut, 1, 4, md3_accel, slide up
    animation = windowsMove, 1, 5, fluent_decel, slide

    # Borders
    animation = border, 1, 3, md3_decel
    animation = borderangle, 1, 30, linear, loop

    # Fading
    animation = fade, 1, 3, md3_decel

    # Workspaces
    animation = workspaces, 1, 5, fluent_decel, slidevert
    animation = specialWorkspace, 1, 5, md3_decel, slidefadevert 15%

    # Layers (like menus, application launchers, bar)
    animation = layersIn, 1, 4, fluent_decel, slide
    animation = layersOut, 1, 4, md3_accel, slide
}
